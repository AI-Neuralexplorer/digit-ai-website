<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — DIGIT-AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0A1428; --navy-mid: #1B2A4A; --navy-light: #243554;
    --gold: #B8926A; --gold-light: #D4AE8A; --gold-pale: rgba(184,146,106,0.1);
    --cream: #F5F0E8; --cream-dim: rgba(245,240,232,0.7); --cream-muted: rgba(245,240,232,0.4);
    --border: rgba(184,146,106,0.2); --border-light: rgba(245,240,232,0.08);
    --red: #e05252; --green: #4caf80;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
  }
  .login-box { width: 100%; max-width: 400px; text-align: center; }
  .login-logo { font-size: 17px; font-weight: 500; letter-spacing: 0.18em; color: var(--cream); margin-bottom: 48px; display: flex; align-items: center; gap: 10px; justify-content: center; }
  .login-logo span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); display: inline-block; }
  .login-box h2 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 28px; margin-bottom: 32px; color: var(--cream-dim); }
  .field { margin-bottom: 20px; text-align: left; }
  .field label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cream-muted); display: block; margin-bottom: 8px; }
  .field input { width: 100%; background: var(--navy-mid); border: 1px solid var(--border); color: var(--cream); padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--gold); }
  .btn-primary { width: 100%; background: var(--gold); color: var(--navy); border: none; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  #login-error { color: var(--red); font-size: 13px; margin-top: 16px; display: none; }

  /* ADMIN SHELL */
  #admin-shell { display: none; }
  header {
    background: rgba(10,20,40,0.98); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .header-logo { font-size: 15px; font-weight: 500; letter-spacing: 0.18em; color: var(--cream); display: flex; align-items: center; gap: 8px; }
  .header-logo span { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); display: inline-block; }
  .header-right { display: flex; gap: 16px; align-items: center; }
  .header-right a { font-size: 12px; color: var(--cream-muted); text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s; }
  .header-right a:hover { color: var(--gold); }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--cream-muted); padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.06em; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

  main { max-width: 1100px; margin: 0 auto; padding: 40px 32px; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  .page-header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 32px; }
  .btn-new { background: var(--gold); color: var(--navy); border: none; padding: 11px 24px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; text-decoration: none; }
  .btn-new:hover { opacity: 0.85; }

  /* ARTICLE LIST */
  #article-list { display: none; }
  .article-row {
    display: grid; grid-template-columns: 1fr auto auto auto; gap: 16px; align-items: center;
    padding: 20px 24px; border: 1px solid var(--border-light); margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .article-row:hover { border-color: var(--border); }
  .art-title-cell h3 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; margin-bottom: 4px; }
  .art-title-cell .meta { font-size: 12px; color: var(--cream-muted); }
  .status-badge {
    font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 8px; border: 1px solid;
  }
  .status-badge.published { color: var(--green); border-color: var(--green); }
  .status-badge.draft { color: var(--cream-muted); border-color: var(--border); }
  .row-actions { display: flex; gap: 8px; }
  .btn-sm {
    background: none; border: 1px solid var(--border); color: var(--cream-muted);
    padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 11px;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .btn-sm:hover { border-color: var(--gold); color: var(--gold); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

  /* EDITOR */
  #editor-panel { display: none; }
  .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .editor-header h2 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 26px; }
  .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .editor-grid.full { grid-template-columns: 1fr; }
  .form-field { display: flex; flex-direction: column; gap: 8px; }
  .form-field label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cream-muted); }
  .form-field input, .form-field select, .form-field textarea {
    background: var(--navy-mid); border: 1px solid var(--border); color: var(--cream);
    padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s; resize: vertical;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--gold); }
  .form-field select option { background: var(--navy-mid); }
  #body-field { min-height: 400px; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.7; }
  .editor-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--cream-muted); padding: 11px 24px; font-family: 'DM Sans', sans-serif; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .btn-secondary:hover { border-color: var(--cream-muted); color: var(--cream); }
  .btn-publish { background: var(--gold); color: var(--navy); border: none; padding: 11px 24px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
  .btn-publish:hover { opacity: 0.85; }
  .btn-draft { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 11px 24px; font-family: 'DM Sans', sans-serif; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, color 0.2s; }
  .btn-draft:hover { background: var(--gold-pale); }

  /* TOAST */
  #toast { position: fixed; bottom: 32px; right: 32px; background: var(--navy-mid); border: 1px solid var(--border); padding: 14px 24px; font-size: 14px; opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; transform: none; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  @media (max-width: 680px) {
    .editor-grid { grid-template-columns: 1fr; }
    .article-row { grid-template-columns: 1fr; }
    main { padding: 24px 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span></span>DIGIT-AI</div>
    <h2>Admin Access</h2>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="Enter admin password" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <p id="login-error">Incorrect password. Please try again.</p>
  </div>
</div>

<!-- ADMIN SHELL -->
<div id="admin-shell">
  <header>
    <div class="header-logo"><span></span>DIGIT-AI Admin</div>
    <div class="header-right">
      <a href="/admin/analytics.html">Analytics</a>
      <a href="/" target="_blank">View Site</a>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <main>
    <!-- ARTICLE LIST -->
    <div id="article-list">
      <div class="page-header">
        <h1>Perspectives</h1>
        <button class="btn-new" onclick="openNewArticle()">+ New Article</button>
      </div>
      <div id="articles-container"></div>
    </div>

    <!-- EDITOR -->
    <div id="editor-panel">
      <div class="editor-header">
        <h2 id="editor-heading">New Article</h2>
        <button class="btn-secondary" onclick="showList()">← Back to list</button>
      </div>
      <input type="hidden" id="editing-slug">
      <div class="editor-grid">
        <div class="form-field">
          <label>Title *</label>
          <input type="text" id="f-title" placeholder="Article title" oninput="autoSlug()">
        </div>
        <div class="form-field">
          <label>Category *</label>
          <select id="f-category">
            <option value="">Select category</option>
            <option value="Investor Intelligence">Investor Intelligence</option>
            <option value="Enterprise Strategy">Enterprise Strategy</option>
            <option value="Governance &amp; Risk">Governance &amp; Risk</option>
          </select>
        </div>
        <div class="form-field">
          <label>Slug (auto-generated, editable)</label>
          <input type="text" id="f-slug" placeholder="url-friendly-slug">
        </div>
        <div class="form-field">
          <label>Date</label>
          <input type="text" id="f-date" placeholder="e.g. March 2026">
        </div>
        <div class="form-field">
          <label>Read Time</label>
          <input type="text" id="f-readtime" placeholder="e.g. 6 min read">
        </div>
      </div>
      <div class="editor-grid full">
        <div class="form-field">
          <label>Excerpt (max 200 chars — shown on homepage card)</label>
          <textarea id="f-excerpt" rows="3" placeholder="2-line summary for the article card…" maxlength="200"></textarea>
        </div>
        <div class="form-field">
          <label>Body (Markdown)</label>
          <textarea id="body-field" placeholder="Write the full article in Markdown…"></textarea>
        </div>
      </div>
      <div class="editor-actions">
        <button class="btn-secondary danger btn-sm" id="delete-btn" onclick="deleteArticle()" style="display:none; padding:11px 24px; font-size:13px;">Delete</button>
        <button class="btn-draft" onclick="saveArticle(false)">Save Draft</button>
        <button class="btn-publish" onclick="saveArticle(true)">Publish</button>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const API = '/api';
let token = localStorage.getItem('digit_ai_token');
let articles = [];
let editingSlug = null;

// AUTH
async function doLogin() {
  const pw = document.getElementById('password-input').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const res = await fetch(API + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (!res.ok) { errEl.style.display = 'block'; return; }
    const data = await res.json();
    token = data.token;
    localStorage.setItem('digit_ai_token', token);
    showAdmin();
  } catch(e) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.style.display = 'block';
  }
}
document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function logout() {
  localStorage.removeItem('digit_ai_token');
  token = null;
  document.getElementById('admin-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function showAdmin() {
  if (!token) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-shell').style.display = 'block';
  await loadArticles();
  showList();
}

// ARTICLES
async function loadArticles() {
  try {
    const res = await fetch(API + '/articles', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    articles = data.articles || data;
    renderList();
  } catch(e) {
    showToast('Failed to load articles', 'error');
  }
}

function renderList() {
  const container = document.getElementById('articles-container');
  if (!articles.length) {
    container.innerHTML = '<p style="color:var(--cream-muted);padding:40px 0;text-align:center;">No articles yet. Create your first one.</p>';
    return;
  }
  container.innerHTML = articles.map(a => `
    <div class="article-row">
      <div class="art-title-cell">
        <h3>${escHtml(a.title)}</h3>
        <span class="meta">${escHtml(a.category)} &nbsp;·&nbsp; ${escHtml(a.date)} &nbsp;·&nbsp; ${escHtml(a.read_time)}</span>
      </div>
      <span class="status-badge ${a.published ? 'published' : 'draft'}">${a.published ? 'Published' : 'Draft'}</span>
      <div class="row-actions">
        <button class="btn-sm" onclick="editArticle('${escHtml(a.slug)}')">Edit</button>
        <a href="/articles/${escHtml(a.slug)}" target="_blank" class="btn-sm" style="text-decoration:none;">View</a>
      </div>
    </div>`).join('');
}

function showList() {
  document.getElementById('article-list').style.display = 'block';
  document.getElementById('editor-panel').style.display = 'none';
  renderList();
}

function openNewArticle() {
  editingSlug = null;
  document.getElementById('editing-slug').value = '';
  document.getElementById('editor-heading').textContent = 'New Article';
  document.getElementById('delete-btn').style.display = 'none';
  clearForm();
  document.getElementById('article-list').style.display = 'none';
  document.getElementById('editor-panel').style.display = 'block';
  document.getElementById('f-title').focus();
}

function editArticle(slug) {
  const a = articles.find(x => x.slug === slug);
  if (!a) return;
  editingSlug = slug;
  document.getElementById('editing-slug').value = slug;
  document.getElementById('editor-heading').textContent = 'Edit Article';
  document.getElementById('delete-btn').style.display = 'inline-block';
  document.getElementById('f-title').value = a.title || '';
  document.getElementById('f-category').value = a.category || '';
  document.getElementById('f-slug').value = a.slug || '';
  document.getElementById('f-date').value = a.date || '';
  document.getElementById('f-readtime').value = a.read_time || '';
  document.getElementById('f-excerpt').value = a.excerpt || '';
  document.getElementById('body-field').value = a.body || '';
  document.getElementById('article-list').style.display = 'none';
  document.getElementById('editor-panel').style.display = 'block';
}

function clearForm() {
  ['f-title','f-category','f-slug','f-date','f-readtime','f-excerpt','body-field'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function autoSlug() {
  if (editingSlug) return; // don't overwrite slug when editing
  const title = document.getElementById('f-title').value;
  document.getElementById('f-slug').value = title
    .toLowerCase().trim()
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

async function saveArticle(publish) {
  const title = document.getElementById('f-title').value.trim();
  const category = document.getElementById('f-category').value;
  const slug = document.getElementById('f-slug').value.trim();
  if (!title || !category || !slug) { showToast('Title, category and slug are required', 'error'); return; }

  const payload = {
    title,
    slug,
    category,
    date: document.getElementById('f-date').value.trim(),
    read_time: document.getElementById('f-readtime').value.trim(),
    excerpt: document.getElementById('f-excerpt').value.trim(),
    body: document.getElementById('body-field').value,
    published: publish,
    editingSlug: editingSlug || null
  };

  try {
    const res = await fetch(API + '/articles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(payload)
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Save failed', 'error'); return; }
    showToast(publish ? 'Article published' : 'Draft saved', 'success');
    editingSlug = slug;
    document.getElementById('editing-slug').value = slug;
    document.getElementById('delete-btn').style.display = 'inline-block';
    await loadArticles();
  } catch(e) {
    showToast('Save failed — check connection', 'error');
  }
}

async function deleteArticle() {
  const slug = editingSlug || document.getElementById('editing-slug').value;
  if (!slug) return;
  if (!confirm('Delete this article? This cannot be undone.')) return;
  try {
    const res = await fetch(API + '/articles/' + encodeURIComponent(slug), {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) { showToast('Delete failed', 'error'); return; }
    showToast('Article deleted', 'success');
    editingSlug = null;
    await loadArticles();
    showList();
  } catch(e) {
    showToast('Delete failed', 'error');
  }
}

// TOAST
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3500);
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
if (token) {
  showAdmin();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
</script>
</body>
</html>
